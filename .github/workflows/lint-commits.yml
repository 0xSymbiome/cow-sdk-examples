name: Lint PR Title (Conventional Commits)

on:
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-commits:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      # Source ref: amannn/action-semantic-pull-request@v6
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            quality
            refactor
            revert
            style
            test
