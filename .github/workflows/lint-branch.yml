name: Lint Branch Name

on: [push]

jobs:
  lint-branch:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "dev" ]]; then
            echo "Branch '$BRANCH' is allowed."
            exit 0
          fi
          if [[ "$BRANCH" =~ ^(build|chore|ci|docs|feat|fix|perf|quality|refactor|revert|style|test|release)/.+ ]]; then
            echo "Branch '$BRANCH' is valid."
            exit 0
          fi
          echo "Branch name '$BRANCH' does not match required pattern <type>/<description>"
          echo "Valid types: build, chore, ci, docs, feat, fix, perf, quality, refactor, revert, style, test, release"
          exit 1
