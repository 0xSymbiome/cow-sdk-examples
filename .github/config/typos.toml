[files]
extend-exclude = [
  ".git",
  "target",
  "Cargo.toml",
  "Cargo.lock",
  "*.json",
]

[default]
extend-ignore-re = [
  "(?i)0x[0-9a-f]{8}",
  "(?i)0x[0-9a-f]{40}",
  "(?i)0x[0-9a-f]{64}",
  "(?i)[0-9a-f]{8}",
  "(?i)[0-9a-f]{40}",
  "(?i)[0-9a-f]{64}",
  "[0-9]+nd",
  "[0-9]+rd",
  "[0-9]+st",
  "[0-9]+th",
]

[default.extend-words]
ser = "ser"
typ = "typ"
