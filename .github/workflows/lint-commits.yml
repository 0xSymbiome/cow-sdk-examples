name: Lint PR Title (Conventional Commits)

on:
  pull_request:
    branches: [main, dev]

jobs:
  lint-commits:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            quality
            refactor
            revert
            style
            test
